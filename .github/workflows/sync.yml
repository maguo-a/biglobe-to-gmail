name: biglobe-to-gmail

on:
  schedule:
    # 混雑を避けるため、毎時0分ちょうどではなく2分・7分・12分...にずらして実行
    - cron: "2-59/5 * * * *"
  workflow_dispatch: {}  # 手動実行もできるようにしておく(テスト用)

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 必要なライブラリをインストール
        run: pip install -r requirements.txt

      - name: メール同期スクリプトを実行
        env:
          BIGLOBE_IMAP_SERVER: ${{ secrets.BIGLOBE_IMAP_SERVER }}
          BIGLOBE_USERNAME: ${{ secrets.BIGLOBE_USERNAME }}
          BIGLOBE_PASSWORD: ${{ secrets.BIGLOBE_PASSWORD }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_TARGET_ADDRESS: ${{ secrets.GMAIL_TARGET_ADDRESS }}
        run: python biglobe_to_gmail.py
