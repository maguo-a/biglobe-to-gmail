name: biglobe-to-gmail

on:
  schedule:
    # 混雑を避けるため、毎時0分ちょうどではなく2分・7分・12分...にずらして実行
    - cron: "2-59/5 * * * *"
  workflow_dispatch: {}  # 手動実行もできるようにしておく(テスト用)

# 前回の実行がまだ終わっていない場合、次の実行は「待つ」形にして
# state.jsonの上書き競合(コミットの衝突)を防ぐ
concurrency:
  group: biglobe-to-gmail-sync
  cancel-in-progress: false

# state.jsonをリポジトリにコミットし直すために書き込み権限が必要
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 必要なライブラリをインストール
        run: pip install -r requirements.txt

      - name: メール同期スクリプトを実行
        env:
          # 毎回見る「窓」の日数。初回も2回目以降も常にこの日数を使う。
          SYNC_WINDOW_DAYS: "14"
          BIGLOBE_IMAP_SERVER: ${{ secrets.BIGLOBE_IMAP_SERVER }}
          BIGLOBE_USERNAME: ${{ secrets.BIGLOBE_USERNAME }}
          BIGLOBE_PASSWORD: ${{ secrets.BIGLOBE_PASSWORD }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_TARGET_ADDRESS: ${{ secrets.GMAIL_TARGET_ADDRESS }}
        run: python biglobe_to_gmail.py

      - name: 処理状況(state.json)をリポジトリに保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update sync state [skip ci]"
          git pull --rebase
          git push
